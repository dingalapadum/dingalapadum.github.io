<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Optimale Kodierung</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family:
                    "Segoe UI",
                    system-ui,
                    -apple-system,
                    sans-serif;
                background: #0f172a;
                color: #e2e8f0;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                padding: 2rem 1rem;
            }

            .container {
                max-width: 720px;
                width: 100%;
            }

            h1 {
                font-size: 1.8rem;
                text-align: center;
                margin-bottom: 0.5rem;
                background: linear-gradient(135deg, #60a5fa, #a78bfa);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            .level-indicator {
                text-align: center;
                font-size: 0.85rem;
                color: #94a3b8;
                margin-bottom: 1.5rem;
            }

            .level-indicator strong {
                color: #a78bfa;
            }

            .task-box {
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 12px;
                padding: 1.5rem;
                margin-bottom: 2rem;
                line-height: 1.7;
                font-size: 0.95rem;
            }

            .task-box p {
                margin-bottom: 0.8rem;
            }

            .freq-table {
                display: block;
                margin: 0.5rem 0;
                font-family: "Courier New", monospace;
                background: #0f172a;
                padding: 0.8rem 1.2rem;
                border-radius: 8px;
                border: 1px solid #334155;
                margin-left: auto;
                width: 30%;
                margin-right: auto;
            }

            .freq-row {
                display: flex;
                gap: 1rem;
                align-items: center;
                justify-content: center;
            }

            .freq-row .symbol {
                color: #60a5fa;
                font-weight: 700;
                width: 1.5rem;
            }

            .freq-row .freq {
                color: #fbbf24;
                width: 2rem;
                text-align: right;
            }

            .encoding-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 0.75rem;
                margin-bottom: 1.5rem;
            }

            .encoding-row {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 10px;
                padding: 0.6rem 1rem;
                transition:
                    border-color 0.3s,
                    box-shadow 0.3s;
            }

            .encoding-row:focus-within {
                border-color: #60a5fa;
                box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.2);
            }

            .encoding-label {
                font-weight: 700;
                font-size: 1.2rem;
                color: #60a5fa;
                width: 1.8rem;
                text-align: center;
                flex-shrink: 0;
            }

            .encoding-freq {
                font-size: 0.75rem;
                color: #94a3b8;
                width: 2rem;
                flex-shrink: 0;
            }

            .encoding-input {
                flex: 1;
                min-width: 0;
                background: #0f172a;
                border: 1px solid #475569;
                border-radius: 6px;
                padding: 0.5rem 0.75rem;
                color: #e2e8f0;
                font-family: "Courier New", monospace;
                font-size: 1.1rem;
                letter-spacing: 3px;
                outline: none;
                transition: border-color 0.2s;
            }

            .encoding-input:focus {
                border-color: #60a5fa;
            }

            .encoding-bits {
                font-size: 0.8rem;
                color: #94a3b8;
                width: 3.5rem;
                text-align: right;
                flex-shrink: 0;
                font-family: "Courier New", monospace;
            }

            .stats-panel {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 1rem;
                margin-bottom: 1.5rem;
            }

            .stat-card {
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 12px;
                padding: 1.2rem;
                text-align: center;
                transition: all 0.4s;
            }

            .stat-card.total-bits .stat-value {
                font-size: 2.2rem;
                font-weight: 800;
                color: #60a5fa;
                font-family: "Courier New", monospace;
            }

            .stat-card.prefix-status .stat-value {
                font-size: 1.1rem;
                font-weight: 700;
            }

            .stat-card.optimality-card .stat-value {
                font-size: 1.05rem;
                font-weight: 700;
            }

            .stat-label {
                font-size: 0.8rem;
                color: #94a3b8;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 0.4rem;
            }

            .stat-optimal-hint {
                font-size: 0.72rem;
                color: #475569;
                margin-top: 0.3rem;
                font-family: "Courier New", monospace;
            }

            /* Prefix-free warnings */
            .prefix-ok .stat-value {
                color: #34d399;
            }
            .prefix-bad {
                animation: pulse-red 1.5s ease-in-out infinite;
            }
            .prefix-bad .stat-value {
                color: #f87171;
            }

            @keyframes pulse-red {
                0%,
                100% {
                    background: #1e293b;
                    border-color: #334155;
                }
                50% {
                    background: #2d1219;
                    border-color: #7f1d1d;
                    box-shadow: 0 0 20px rgba(248, 113, 113, 0.15);
                }
            }

            .prefix-conflict-info {
                font-size: 0.75rem;
                color: #f87171;
                margin-top: 0.4rem;
                min-height: 1.2rem;
            }

            /* Optimality card states */
            .optimality-ok .stat-value {
                color: #34d399;
            }
            .optimality-ok {
                border-color: rgba(52, 211, 153, 0.3);
            }
            .optimality-bad .stat-value {
                color: #f87171;
            }
            .optimality-incomplete .stat-value {
                color: #475569;
            }

            .optimality-issues {
                font-size: 0.72rem;
                color: #f87171;
                margin-top: 0.4rem;
                min-height: 1.2rem;
                line-height: 1.4;
            }

            /* Global button press effect */
            button:active {
                transform: scale(0.94) !important;
                filter: brightness(0.82);
                transition: transform 0.06s, filter 0.06s !important;
            }

            /* Save solution button */
            .save-solution-btn {
                display: none;
                width: 100%;
                background: transparent;
                border: 1px solid #34d399;
                color: #34d399;
                padding: 0.6rem 1.5rem;
                border-radius: 8px;
                font-size: 0.9rem;
                cursor: pointer;
                font-weight: 600;
                margin-bottom: 0.75rem;
                transition: background 0.2s, transform 0.06s, filter 0.06s;
            }

            .save-solution-btn:hover {
                background: rgba(52, 211, 153, 0.1);
            }

            .save-solution-btn.show {
                display: block;
            }

            /* Pulsing invite animation */
            @keyframes pulse-invite {
                0%, 100% {
                    box-shadow: 0 4px 18px rgba(96, 165, 250, 0.35);
                    transform: scale(1);
                }
                50% {
                    box-shadow: 0 6px 30px rgba(167, 139, 250, 0.65);
                    transform: scale(1.035);
                }
            }

            .next-level-btn {
                display: none;
                position: fixed;
                bottom: 2rem;
                right: 2rem;
                background: linear-gradient(135deg, #60a5fa, #a78bfa);
                border: none;
                color: white;
                padding: 0.85rem 2.2rem;
                border-radius: 10px;
                font-size: 1.1rem;
                cursor: pointer;
                font-weight: 700;
                z-index: 200;
                animation: pulse-invite 2.2s ease-in-out infinite;
                transition: filter 0.06s;
            }

            .next-level-btn.show {
                display: block;
            }

            /* Congratulations overlay */
            .congrats-overlay {
                position: fixed;
                inset: 0;
                display: none;
                justify-content: center;
                align-items: center;
                z-index: 1000;
                background: rgba(15, 23, 42, 0.85);
                backdrop-filter: blur(4px);
            }

            .congrats-overlay.show {
                display: flex;
                animation: fadeIn 0.5s ease;
            }

            .congrats-box {
                background: linear-gradient(135deg, #1e293b, #0f172a);
                border: 2px solid #a78bfa;
                border-radius: 20px;
                padding: 3rem;
                text-align: center;
                max-width: 500px;
                animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
                box-shadow: 0 0 60px rgba(167, 139, 250, 0.3);
            }

            .congrats-box h2 {
                font-size: 2rem;
                margin-bottom: 1rem;
                background: linear-gradient(135deg, #34d399, #60a5fa, #a78bfa);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            .congrats-box p {
                color: #cbd5e1;
                line-height: 1.6;
                margin-bottom: 1.5rem;
            }

            .congrats-buttons {
                display: flex;
                gap: 0.75rem;
                justify-content: center;
                flex-wrap: wrap;
            }

            .congrats-box button {
                background: linear-gradient(135deg, #60a5fa, #a78bfa);
                border: none;
                color: white;
                padding: 0.7rem 2rem;
                border-radius: 8px;
                font-size: 1rem;
                cursor: pointer;
                font-weight: 600;
                transition: filter 0.06s;
            }

            .congrats-box button.primary-pulse {
                animation: pulse-invite 2.2s ease-in-out infinite;
            }

            .congrats-box button.secondary {
                background: transparent;
                border: 1px solid #475569;
                color: #94a3b8;
                animation: none;
            }

            .congrats-box button.secondary:hover {
                border-color: #60a5fa;
                color: #e2e8f0;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            @keyframes scaleIn {
                from {
                    transform: scale(0.5);
                    opacity: 0;
                }
                to {
                    transform: scale(1);
                    opacity: 1;
                }
            }

            /* Confetti canvas */
            #confetti-canvas {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 1001;
            }

            .hint {
                text-align: center;
                color: #64748b;
                font-size: 0.8rem;
                margin-top: 0.5rem;
                font-style: italic;
            }

            /* Help input (now lives inside nav panel) */
            .nav-help-row {
                margin-top: 1rem;
                padding-top: 0.75rem;
                border-top: 1px solid #334155;
                display: flex;
                justify-content: center;
            }

            .help-input {
                background: #0f172a;
                border: 1px solid #334155;
                border-radius: 8px;
                padding: 0.4rem 0.9rem;
                color: #e2e8f0;
                font-family: "Courier New", monospace;
                font-size: 0.85rem;
                outline: none;
                width: 180px;
                text-align: center;
                transition: border-color 0.2s;
            }

            .help-input:focus {
                border-color: #60a5fa;
            }

            .help-input::placeholder {
                color: #475569;
                font-family: "Segoe UI", system-ui, sans-serif;
                font-style: italic;
                font-size: 0.8rem;
            }

            /* Solution sections */
            .solution-section {
                display: none;
                margin-top: 1.5rem;
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 12px;
                padding: 1.5rem;
                animation: fadeIn 0.5s ease;
            }

            .solution-section.show {
                display: block;
            }

            .solution-section h3 {
                color: #a78bfa;
                margin-bottom: 1rem;
                font-size: 1rem;
            }

            .solution-table {
                width: 100%;
                border-collapse: collapse;
                font-family: "Courier New", monospace;
                font-size: 0.9rem;
            }

            .solution-table th {
                text-align: left;
                color: #94a3b8;
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 1px;
                padding: 0.4rem 0.8rem;
                border-bottom: 1px solid #334155;
            }

            .solution-table td {
                padding: 0.4rem 0.8rem;
                border-bottom: 1px solid #1e293b;
            }

            .solution-table .sol-letter {
                color: #60a5fa;
                font-weight: 700;
            }
            .solution-table .sol-code {
                color: #34d399;
                letter-spacing: 2px;
            }
            .solution-table .sol-bits {
                color: #fbbf24;
                text-align: right;
            }

            /* Level bar (indicator + toggle button) */
            .level-bar {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.75rem;
                margin-bottom: 1.5rem;
            }

            .level-bar .level-indicator {
                margin-bottom: 0;
            }

            .nav-toggle-btn {
                background: transparent;
                border: 1px solid #334155;
                color: #94a3b8;
                font-size: 0.8rem;
                padding: 0.25rem 0.65rem;
                border-radius: 6px;
                cursor: pointer;
                transition:
                    border-color 0.2s,
                    color 0.2s;
                white-space: nowrap;
            }

            .nav-toggle-btn:hover {
                border-color: #60a5fa;
                color: #60a5fa;
            }

            /* Nav overlay */
            .nav-overlay {
                position: fixed;
                inset: 0;
                display: none;
                justify-content: center;
                align-items: flex-start;
                padding-top: 6rem;
                z-index: 800;
                background: rgba(15, 23, 42, 0.7);
                backdrop-filter: blur(3px);
            }

            .nav-overlay.show {
                display: flex;
                animation: fadeIn 0.2s ease;
            }

            /* Blur + disable the page content when nav is open */
            body.nav-open .container {
                filter: blur(4px);
                pointer-events: none;
                user-select: none;
            }

            .nav-panel {
                background: #1e293b;
                border: 1px solid #475569;
                border-radius: 16px;
                padding: 1.25rem 1.5rem;
                width: 100%;
                max-width: 420px;
                max-height: 70vh;
                overflow-y: auto;
                animation: scaleIn 0.2s cubic-bezier(0.34, 1.4, 0.64, 1);
            }

            .nav-panel-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 1rem;
                padding-bottom: 0.75rem;
                border-bottom: 1px solid #334155;
                color: #94a3b8;
                font-size: 0.85rem;
            }

            .level-nav-list {
                display: flex;
                flex-direction: column;
                gap: 0.3rem;
                margin-top: 0.75rem;
            }

            .level-nav-item {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                padding: 0.45rem 0.75rem;
                border-radius: 8px;
                font-size: 0.85rem;
                border: 1px solid transparent;
                transition: background 0.15s;
            }

            .level-nav-item.clickable {
                cursor: pointer;
            }

            .level-nav-item.solved {
                color: #34d399;
            }

            .level-nav-item.solved.clickable:hover {
                background: rgba(52, 211, 153, 0.08);
                border-color: rgba(52, 211, 153, 0.2);
            }

            .level-nav-item.frontier {
                color: #fbbf24;
            }

            .level-nav-item.frontier.clickable:hover {
                background: rgba(251, 191, 36, 0.08);
                border-color: rgba(251, 191, 36, 0.2);
            }

            .level-nav-item.unreachable {
                color: #475569;
            }

            .level-nav-item.active {
                border-color: rgba(255, 255, 255, 0.15);
                background: rgba(255, 255, 255, 0.04);
                font-weight: 600;
            }

            .level-nav-icon {
                width: 1rem;
                text-align: center;
                flex-shrink: 0;
                font-size: 0.8rem;
            }

            .start-over-btn {
                background: transparent;
                border: 1px solid #334155;
                color: #64748b;
                font-size: 0.75rem;
                padding: 0.3rem 0.75rem;
                border-radius: 6px;
                cursor: pointer;
                transition:
                    border-color 0.2s,
                    color 0.2s;
                white-space: nowrap;
            }

            .start-over-btn:hover {
                border-color: #f87171;
                color: #f87171;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Optimale Kodierung</h1>
            <div class="level-bar">
                <div class="level-indicator" id="level-indicator"></div>
                <button class="nav-toggle-btn" onclick="toggleNav()">
                    ☰ Übersicht
                </button>
            </div>

            <div class="task-box" id="task-box"></div>

            <div class="encoding-grid" id="encoding-grid"></div>

            <div class="stats-panel">
                <div class="stat-card total-bits">
                    <div class="stat-label">Gesamtanzahl Bits</div>
                    <div class="stat-value" id="total-bits">0</div>
                    <div class="stat-optimal-hint" id="optimal-bits-hint"></div>
                </div>
                <div class="stat-card prefix-status" id="prefix-card">
                    <div class="stat-label">Präfixfreiheit</div>
                    <div class="stat-value" id="prefix-status">—</div>
                    <div
                        class="prefix-conflict-info"
                        id="prefix-conflict"
                    ></div>
                </div>
                <div class="stat-card optimality-card optimality-incomplete" id="optimality-card">
                    <div class="stat-label">Optimalität</div>
                    <div class="stat-value" id="optimality-status">—</div>
                    <div class="optimality-issues" id="optimality-issues"></div>
                </div>
            </div>

            <button
                class="save-solution-btn"
                id="save-solution-btn"
                onclick="saveCurrentSolution()"
            >
                ▼&ensp;Lösung speichern
            </button>

            <div class="solution-section" id="user-solution-section">
                <h3>Deine Lösung</h3>
                <table class="solution-table" id="user-solution-table"></table>
            </div>

            <div class="solution-section" id="solution-section">
                <h3>Mögliche Lösung (Huffman)</h3>
                <table class="solution-table" id="solution-table"></table>
            </div>
        </div>

        <button
            class="next-level-btn"
            id="next-level-btn"
            onclick="nextLevel()"
        >
            Nächste Aufgabe →
        </button>

        <div class="nav-overlay" id="nav-overlay" onclick="handleNavOverlayClick(event)">
            <div class="nav-panel">
                <div class="nav-panel-header">
                    <span>Aufgaben-Übersicht</span>
                    <button class="start-over-btn" onclick="startOver(event)">
                        Von vorne beginnen
                    </button>
                </div>
                <div class="level-nav-list" id="level-nav-list"></div>
                <div class="nav-help-row">
                    <input
                        class="help-input"
                        id="help-input"
                        type="text"
                        maxlength="10"
                        autocomplete="off"
                        spellcheck="false"
                        placeholder="Geheimcode"
                    />
                </div>
            </div>
        </div>

        <div class="congrats-overlay" id="congrats-overlay">
            <div class="congrats-box">
                <h2 id="congrats-title">Hervorragend!</h2>
                <p id="congrats-text"></p>
                <div class="congrats-buttons" id="congrats-buttons"></div>
            </div>
        </div>

        <canvas id="confetti-canvas"></canvas>

        <script>
            // ── Task definitions (edit these to change the exercises) ──
            const tasks = [
                {
                    symbols: [
                        { letter: "X", freq: 10 },
                        { letter: "Y", freq: 5 },
                        { letter: "C", freq: 2 },
                        { letter: "D", freq: 2 },
                    ],
                },
                {
                    symbols: [
                        { letter: "A", freq: 10 },
                        { letter: "B", freq: 10 },
                        { letter: "C", freq: 10 },
                        { letter: "D", freq: 10 },
                        { letter: "E", freq: 10 },
                        { letter: "F", freq: 10 },
                        { letter: "G", freq: 10 },
                        { letter: "H", freq: 10 },
                    ],
                },
                {
                    symbols: [
                        { letter: "A", freq: 30 },
                        { letter: "B", freq: 10 },
                        { letter: "C", freq: 10 },
                        { letter: "D", freq: 10 },
                        { letter: "E", freq: 10 },
                        { letter: "F", freq: 10 },
                        { letter: "G", freq: 1 },
                        { letter: "H", freq: 1 },
                    ],
                },
                {
                    symbols: [
                        { letter: "A", freq: 40 },
                        { letter: "B", freq: 27 },
                        { letter: "C", freq: 25 },
                        { letter: "D", freq: 15 },
                        { letter: "E", freq: 6 },
                        { letter: "F", freq: 5 },
                        { letter: "G", freq: 2 },
                        { letter: "H", freq: 2 },
                    ],
                },
            ];

            let currentLevel = 0;
            let symbols = [];
            let optimalBits = 0;
            let inputs = {};
            let hasCelebrated = false;
            let levelSolved = false;
            let currentWord = "";
            let solvedLevels = new Set();
            let progressData = { solved: [], solutions: {} };

            // ── Progress persistence ──
            function loadProgress() {
                try {
                    progressData = JSON.parse(
                        localStorage.getItem("opticode_progress") || "{}",
                    );
                    progressData.solved = progressData.solved || [];
                    progressData.solutions = progressData.solutions || {};
                    solvedLevels = new Set(progressData.solved);
                } catch (e) {
                    progressData = { solved: [], solutions: {} };
                    solvedLevels = new Set();
                }
            }

            function saveProgress() {
                progressData.solved = [...solvedLevels];
                localStorage.setItem(
                    "opticode_progress",
                    JSON.stringify(progressData),
                );
            }

            function markSolved(index) {
                solvedLevels.add(index);
                const userCodes = {};
                symbols.forEach((s) => {
                    userCodes[s.letter] = inputs[s.letter].value;
                });
                progressData.solutions[String(index)] = userCodes;
                saveProgress();
                renderLevelNav();
            }

            function computeFrontierLevel() {
                let f = 0;
                while (f < tasks.length && solvedLevels.has(f)) f++;
                return f;
            }

            // ── Level navigation ──
            function renderLevelNav() {
                const list = document.getElementById("level-nav-list");
                const frontier = computeFrontierLevel();
                list.innerHTML = "";

                tasks.forEach((task, i) => {
                    const isSolved = solvedLevels.has(i);
                    const isFrontier = i === frontier;
                    const isActive = i === currentLevel;
                    const isClickable = isSolved || isFrontier;

                    const item = document.createElement("div");
                    item.className =
                        "level-nav-item" +
                        (isSolved
                            ? " solved"
                            : isFrontier
                              ? " frontier"
                              : " unreachable") +
                        (isActive ? " active" : "") +
                        (isClickable ? " clickable" : "");

                    const icon = isSolved ? "✓" : isFrontier ? "→" : "○";
                    item.innerHTML = `
                        <span class="level-nav-icon">${icon}</span>
                        <span>Aufgabe ${i + 1} <span style="font-size:0.75rem; opacity:0.65;">(${task.symbols.length} Symbole)</span></span>
                    `;

                    if (isClickable) {
                        item.addEventListener("click", () => jumpToLevel(i));
                    }

                    list.appendChild(item);
                });
            }

            function toggleNav() {
                const overlay = document.getElementById("nav-overlay");
                if (overlay.classList.contains("show")) {
                    closeNav();
                } else {
                    renderLevelNav();
                    overlay.classList.add("show");
                    document.body.classList.add("nav-open");
                }
            }

            function closeNav() {
                document.getElementById("nav-overlay").classList.remove("show");
                document.body.classList.remove("nav-open");
            }

            function handleNavOverlayClick(e) {
                if (e.target === document.getElementById("nav-overlay")) {
                    closeNav();
                }
            }

            function jumpToLevel(index) {
                const frontier = computeFrontierLevel();
                if (!solvedLevels.has(index) && index !== frontier) return;
                closeNav();
                currentLevel = index;
                loadLevel();
            }

            function startOver(e) {
                e.preventDefault();
                e.stopPropagation();
                if (
                    confirm(
                        "Wirklich von vorne beginnen? Der gesamte Fortschritt geht verloren.",
                    )
                ) {
                    localStorage.removeItem("opticode_progress");
                    solvedLevels = new Set();
                    progressData = { solved: [], solutions: {} };
                    currentLevel = 0;
                    closeNav();
                    loadLevel();
                }
            }

            // ── Generate word from symbol frequencies ──
            function generateWord(syms) {
                const letters = [];
                syms.forEach((s) => {
                    for (let i = 0; i < s.freq; i++) letters.push(s.letter);
                });
                // Fisher-Yates shuffle
                for (let i = letters.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [letters[i], letters[j]] = [letters[j], letters[i]];
                }
                return letters.join("");
            }

            // ── Huffman algorithm ──
            function buildHuffmanTree(syms) {
                let nodes = syms.map((s) => ({
                    freq: s.freq,
                    letter: s.letter,
                }));
                while (nodes.length > 1) {
                    nodes.sort((a, b) => a.freq - b.freq);
                    const left = nodes.shift();
                    const right = nodes.shift();
                    nodes.push({ freq: left.freq + right.freq, left, right });
                }
                return nodes[0];
            }

            function getHuffmanCodes(root) {
                const codes = {};
                function walk(node, prefix) {
                    if (node.letter !== undefined) {
                        codes[node.letter] = prefix || "0";
                        return;
                    }
                    if (node.left) walk(node.left, prefix + "0");
                    if (node.right) walk(node.right, prefix + "1");
                }
                walk(root, "");
                return codes;
            }

            function computeOptimalBits(syms) {
                const tree = buildHuffmanTree(syms);
                const codes = getHuffmanCodes(tree);
                let total = 0;
                syms.forEach((s) => {
                    total += codes[s.letter].length * s.freq;
                });
                return total;
            }

            // ── Render task box dynamically ──
            function renderTaskBox() {
                const box = document.getElementById("task-box");
                const letters = symbols.map((s) => s.letter).join(", ");
                const freqRows = symbols
                    .map(
                        (s) =>
                            `<div class="freq-row"><span class="symbol">${s.letter}:</span><span class="freq">${s.freq}</span></div>`,
                    )
                    .join("");

                box.innerHTML = `
        <p>Quellalphabet: <strong>{${letters}}</strong>. (${symbols.length} Symbole)</p>
        <p>Codealphabet: <strong>{0, 1}</strong>.</p>
        <p>Man will das folgende Wort kodieren: </p>
        <p><span style="font-family:'Courier New',monospace; color:#fbbf24; word-break:break-all;">${currentWord}</span></p>
        <p>Die Häufigkeiten der Buchstaben darin sind:</p>
        <div class="freq-table">${freqRows}</div>
        <p style="margin-top: 1rem;">Erstelle einen Code, der insgesamt so wenig Bits wie möglich benötigt und zudem <strong>präfixfrei</strong> ist (damit die Eindeutigkeit gewährleistet ist).</p>
    `;
            }

            // ── Render encoding grid ──
            function renderGrid() {
                const grid = document.getElementById("encoding-grid");
                grid.innerHTML = "";
                inputs = {};

                symbols.forEach((s) => {
                    const row = document.createElement("div");
                    row.className = "encoding-row";
                    row.innerHTML = `
            <span class="encoding-label">${s.letter}</span>
            <span class="encoding-freq">×${s.freq}</span>
            <input class="encoding-input" type="text" data-letter="${s.letter}" placeholder="z.B. 010" autocomplete="off" spellcheck="false">
            <span class="encoding-bits" id="bits-${s.letter}">—</span>
        `;
                    grid.appendChild(row);
                    const input = row.querySelector("input");
                    inputs[s.letter] = input;

                    input.addEventListener("input", (e) => {
                        e.target.value = e.target.value.replace(/[^01]/g, "");
                        update();
                    });
                });
            }

            // ── Render solution ──
            function renderSolution() {
                const table = document.getElementById("solution-table");
                const tree = buildHuffmanTree(symbols);
                const codes = getHuffmanCodes(tree);
                let totalBits = 0;

                let html = `<tr><th>Symbol</th><th>Code</th><th style="text-align:right">Bits</th></tr>`;
                symbols.forEach((s) => {
                    const code = codes[s.letter];
                    const bits = code.length * s.freq;
                    totalBits += bits;
                    html += `<tr>
            <td class="sol-letter">${s.letter} (×${s.freq})</td>
            <td class="sol-code">${code}</td>
            <td class="sol-bits">${bits}</td>
        </tr>`;
                });
                html += `<tr><td colspan="2" style="color:#94a3b8; padding-top:0.6rem; border-top:1px solid #334155;"><strong>Gesamt</strong></td><td class="sol-bits" style="padding-top:0.6rem; border-top:1px solid #334155;"><strong>${totalBits}</strong></td></tr>`;
                table.innerHTML = html;
            }

            // ── Render user's saved solution ──
            function renderUserSolution(codes) {
                const table = document.getElementById("user-solution-table");
                let totalBits = 0;
                let html = `<tr><th>Symbol</th><th>Dein Code</th><th style="text-align:right">Bits</th></tr>`;
                symbols.forEach((s) => {
                    const code = codes[s.letter] || "";
                    const bits = code.length * s.freq;
                    totalBits += bits;
                    html += `<tr>
                        <td class="sol-letter">${s.letter} (×${s.freq})</td>
                        <td class="sol-code">${code}</td>
                        <td class="sol-bits">${bits}</td>
                    </tr>`;
                });
                html += `<tr><td colspan="2" style="color:#94a3b8; padding-top:0.6rem; border-top:1px solid #334155;"><strong>Gesamt</strong></td><td class="sol-bits" style="padding-top:0.6rem; border-top:1px solid #334155;"><strong>${totalBits}</strong></td></tr>`;
                table.innerHTML = html;
            }

            // ── Level indicator ──
            function renderLevelIndicator() {
                document.getElementById("level-indicator").innerHTML =
                    `Aufgabe <strong>${currentLevel + 1}</strong> von <strong>${tasks.length}</strong>`;
            }

            // ── Prefix check ──
            function isPrefixFree(codes) {
                const entries = Object.entries(codes).filter(
                    ([, v]) => v.length > 0,
                );
                const conflicts = [];
                for (let i = 0; i < entries.length; i++) {
                    for (let j = i + 1; j < entries.length; j++) {
                        const [la, ca] = entries[i];
                        const [lb, cb] = entries[j];
                        if (ca.startsWith(cb) || cb.startsWith(ca)) {
                            conflicts.push([la, lb]);
                        }
                    }
                }
                return { free: conflicts.length === 0, conflicts };
            }

            // ── Update loop ──
            function update() {
                // Snapshot whether a saved solution existed BEFORE this call
                const hadSolution =
                    !!progressData.solutions[String(currentLevel)];

                const codes = {};
                let totalBits = 0;
                let allFilled = true;

                symbols.forEach((s) => {
                    const val = inputs[s.letter].value;
                    codes[s.letter] = val;
                    const bitsEl = document.getElementById(`bits-${s.letter}`);
                    if (val.length > 0) {
                        const bits = val.length * s.freq;
                        totalBits += bits;
                        bitsEl.textContent = `${bits} Bits`;
                    } else {
                        bitsEl.textContent = "—";
                        allFilled = false;
                    }
                });

                // ── Total bits card ──
                document.getElementById("total-bits").textContent =
                    totalBits || "0";
                const optHintEl = document.getElementById("optimal-bits-hint");
                optHintEl.textContent =
                    allFilled && totalBits > 0
                        ? `Minimum: ${optimalBits} Bits`
                        : "";

                // ── Prefix-free card ──
                const prefixCard = document.getElementById("prefix-card");
                const prefixStatus = document.getElementById("prefix-status");
                const prefixConflict =
                    document.getElementById("prefix-conflict");

                const filledCodes = Object.entries(codes).filter(
                    ([, v]) => v.length > 0,
                );

                let prefixFree = false;
                if (filledCodes.length < 2) {
                    prefixCard.className = "stat-card prefix-status";
                    prefixStatus.textContent = "—";
                    prefixConflict.textContent = "";
                } else {
                    const result = isPrefixFree(codes);
                    prefixFree = result.free;
                    if (result.free) {
                        prefixCard.className =
                            "stat-card prefix-status prefix-ok";
                        prefixStatus.textContent = "Präfixfrei ✓";
                        prefixConflict.textContent = "";
                    } else {
                        prefixCard.className =
                            "stat-card prefix-status prefix-bad";
                        prefixStatus.textContent = "Nicht präfixfrei ✗";
                        const first = result.conflicts
                            .slice(0, 3)
                            .map(([a, b]) => `${a}↔${b}`)
                            .join(", ");
                        prefixConflict.textContent = `Konflikte: ${first}${result.conflicts.length > 3 ? " …" : ""}`;
                    }
                }

                // ── Optimality card ──
                const optCard = document.getElementById("optimality-card");
                const optStatus = document.getElementById("optimality-status");
                const optIssues = document.getElementById("optimality-issues");
                const savBtn = document.getElementById("save-solution-btn");

                const isOptimal =
                    allFilled && prefixFree && totalBits === optimalBits;

                if (!allFilled) {
                    optCard.className =
                        "stat-card optimality-card optimality-incomplete";
                    optStatus.textContent = "—";
                    optIssues.textContent = "";
                } else if (isOptimal) {
                    optCard.className =
                        "stat-card optimality-card optimality-ok";
                    optStatus.textContent = "Optimal ✓";
                    optIssues.textContent = "";
                } else {
                    optCard.className =
                        "stat-card optimality-card optimality-bad";
                    optStatus.textContent = "Nicht optimal";
                    const issues = [];
                    if (!prefixFree) issues.push("nicht präfixfrei");
                    if (totalBits > optimalBits) issues.push("es geht kürzer");
                    optIssues.textContent = issues.length
                        ? `(${issues.join(", ")})`
                        : "";
                }

                // ── Auto-save + celebrate on first optimal solve ──
                if (isOptimal && !hasCelebrated) {
                    hasCelebrated = true;
                    levelSolved = true;
                    markSolved(currentLevel); // saves codes to progressData
                    // Show user solution immediately
                    renderUserSolution(
                        progressData.solutions[String(currentLevel)],
                    );
                    document
                        .getElementById("user-solution-section")
                        .classList.add("show");
                    showCongrats(totalBits);
                }

                // Save button: only shown for a *second* optimal (hadSolution = true before this call)
                savBtn.classList.toggle("show", isOptimal && hadSolution);
            }

            // ── Save current optimal solution ──
            function saveCurrentSolution() {
                const userCodes = {};
                symbols.forEach((s) => {
                    userCodes[s.letter] = inputs[s.letter].value;
                });
                progressData.solutions[String(currentLevel)] = userCodes;
                saveProgress();
                renderUserSolution(userCodes);
                document
                    .getElementById("user-solution-section")
                    .classList.add("show");
            }

            // ── Congrats ──
            function showCongrats(bits) {
                const isLast = currentLevel >= tasks.length - 1;
                document.getElementById("congrats-title").textContent = isLast
                    ? "Hervorragend!"
                    : "Sehr gut!";
                document.getElementById("congrats-text").innerHTML = isLast
                    ? `Du hast die optimale präfixfreie Codierung gefunden!<br>Dein Code benötigt nur <strong>${bits} Bits</strong> — das absolute Minimum.`
                    : `Aufgabe ${currentLevel + 1} gelöst!<br>Dein Code benötigt nur <strong>${bits} Bits</strong> — das absolute Minimum.`;

                const btns = document.getElementById("congrats-buttons");
                if (isLast) {
                    btns.innerHTML = `<button onclick="closeOverlay()">Weiter experimentieren</button>`;
                } else {
                    btns.innerHTML = `
            <button class="primary-pulse" onclick="nextLevel()">Nächste Aufgabe →</button>
            <button class="secondary" onclick="stayOnLevel()">Weiter experimentieren</button>
        `;
                }

                setTimeout(() => {
                    document
                        .getElementById("congrats-overlay")
                        .classList.add("show");
                    launchConfetti();
                }, 300);
                
            }

            function closeOverlay() {
                document
                    .getElementById("congrats-overlay")
                    .classList.remove("show");
            }

            function stayOnLevel() {
                closeOverlay();
                // Show persistent next-level button if not on last level
                if (currentLevel < tasks.length - 1) {
                    document
                        .getElementById("next-level-btn")
                        .classList.add("show");
                }
            }

            function nextLevel() {
                closeOverlay();
                currentLevel++;
                loadLevel();
            }

            // ── Load a level ──
            function loadLevel() {
                symbols = tasks[currentLevel].symbols;
                optimalBits = computeOptimalBits(symbols);
                const alreadySolved = solvedLevels.has(currentLevel);
                hasCelebrated = alreadySolved;
                levelSolved = alreadySolved;
                currentWord = generateWord(symbols);

                renderLevelIndicator();
                renderTaskBox();
                renderGrid();
                renderSolution();

                // Always hide Huffman solution and reset secret input
                document
                    .getElementById("solution-section")
                    .classList.remove("show");
                document.getElementById("help-input").value = "";

                // If previously solved: pre-fill inputs and show user's solution
                const savedCodes =
                    progressData.solutions[String(currentLevel)];
                if (alreadySolved && savedCodes) {
                    symbols.forEach((s) => {
                        if (inputs[s.letter] && savedCodes[s.letter]) {
                            inputs[s.letter].value = savedCodes[s.letter];
                        }
                    });
                    update();
                    renderUserSolution(savedCodes);
                    document
                        .getElementById("user-solution-section")
                        .classList.add("show");
                } else {
                    document
                        .getElementById("user-solution-section")
                        .classList.remove("show");
                    // Reset stats only when starting fresh
                    document.getElementById("total-bits").textContent = "0";
                    document.getElementById("optimal-bits-hint").textContent =
                        "";
                    document.getElementById("prefix-card").className =
                        "stat-card prefix-status";
                    document.getElementById("prefix-status").textContent = "—";
                    document.getElementById("prefix-conflict").textContent = "";
                    document.getElementById("optimality-card").className =
                        "stat-card optimality-card optimality-incomplete";
                    document.getElementById("optimality-status").textContent =
                        "—";
                    document.getElementById("optimality-issues").textContent =
                        "";
                    document
                        .getElementById("save-solution-btn")
                        .classList.remove("show");
                }

                document
                    .getElementById("next-level-btn")
                    .classList.remove("show");
            }

            function encrypt(text, key) {
                const normalizedKey = key.toLowerCase().replace(/[^a-z]/g, "");
                if (!normalizedKey)
                    throw new Error("Key must contain at least one letter");

                let keyIndex = 0;
                return text
                    .split("")
                    .map((char) => {
                        const code = char.charCodeAt(0);
                        const isUpper = code >= 65 && code <= 90;
                        const isLower = code >= 97 && code <= 122;

                        if (!isUpper && !isLower) return char; // leave non-letters unchanged

                        const base = isUpper ? 65 : 97;
                        const shift =
                            normalizedKey.charCodeAt(
                                keyIndex % normalizedKey.length,
                            ) - 97;
                        keyIndex++;

                        return String.fromCharCode(
                            ((code - base + shift) % 26) + base,
                        );
                    })
                    .join("");
            }

            // ── Help input ──
            document
                .getElementById("help-input")
                .addEventListener("input", (e) => {
                    const val = encrypt(
                        e.target.value.trim().toLowerCase(),
                        "asdf",
                    );
                    if (val === "hwou") {
                        document
                            .getElementById("solution-section")
                            .classList.add("show");
                    } else {
                        document
                            .getElementById("solution-section")
                            .classList.remove("show");
                    }
                });

            // ── Confetti ──
            function launchConfetti() {
                const canvas = document.getElementById("confetti-canvas");
                const ctx = canvas.getContext("2d");
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                const colors = [
                    "#60a5fa",
                    "#a78bfa",
                    "#34d399",
                    "#fbbf24",
                    "#f87171",
                    "#fb923c",
                    "#e879f9",
                ];
                const pieces = [];

                for (let i = 0; i < 200; i++) {
                    pieces.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height - canvas.height,
                        w: Math.random() * 10 + 5,
                        h: Math.random() * 6 + 3,
                        color: colors[
                            Math.floor(Math.random() * colors.length)
                        ],
                        vx: (Math.random() - 0.5) * 4,
                        vy: Math.random() * 3 + 2,
                        rot: Math.random() * Math.PI * 2,
                        rv: (Math.random() - 0.5) * 0.2,
                        opacity: 1,
                    });
                }

                let frame = 0;
                const maxFrames = 300;

                function animate() {
                    if (frame > maxFrames) {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        return;
                    }
                    frame++;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    pieces.forEach((p) => {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.05;
                        p.rot += p.rv;
                        if (frame > maxFrames - 60) {
                            p.opacity = Math.max(0, p.opacity - 0.02);
                        }

                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rot);
                        ctx.globalAlpha = p.opacity;
                        ctx.fillStyle = p.color;
                        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                        ctx.restore();
                    });

                    requestAnimationFrame(animate);
                }

                animate();
            }

            window.addEventListener("resize", () => {
                const canvas = document.getElementById("confetti-canvas");
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });

            // ── Start ──
            loadProgress();
            currentLevel = computeFrontierLevel();
            if (currentLevel >= tasks.length) currentLevel = tasks.length - 1;
            loadLevel();
        </script>
    </body>
</html>
